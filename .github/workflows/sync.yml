name: 24-Hour Fast Sync Fork
on:
  schedule:
    # Runs every 5 minutes (GitHub's maximum speed limit)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual trigger anytime

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push updates back to your fork
    steps:
      - name: Check 24-Hour Expiration Time
        run: |
          CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EXPIRATION_TIME="2026-07-04T10:15:00Z"
          
          echo "Current time:    $CURRENT_TIME"
          echo "Expiration time: $EXPIRATION_TIME"
          
          if [[ "$CURRENT_TIME" > "$EXPIRATION_TIME" ]]; then
            echo "The 24-hour sync window has expired. Stopping workflow."
            exit 1
          fi
          echo "Time check passed. Proceeding with sync."

      - name: Sync Upstream
        uses: tgymnich/fork-sync-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main      # Change this if your fork branch is named differently
          head: main      # Change this if the original repo branch is named differently
