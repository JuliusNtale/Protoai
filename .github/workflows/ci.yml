name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run all tests ────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install root dependencies (test runner)
        run: npm install

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install AI service dependencies
        run: pip install -r requirements.txt
        working-directory: ai-service

      - name: Run root API tests
        run: npm test

      - name: Run backend unit tests
        run: npm test
        working-directory: backend

      - name: Run AI service tests
        run: python -m pytest tests/ -v
        working-directory: ai-service

  # ── Job 2: Build Docker images (only if tests pass) ─────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t proctoring-backend ./backend

      - name: Build frontend image
        run: docker build -t proctoring-frontend ./frontend

      - name: Build AI service image
        run: docker build -t proctoring-ai-service ./ai-service
