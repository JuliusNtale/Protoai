name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run backend/API/AI tests ─────────────────────────────────────────
  api-tests:
    name: API and AI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            ai-service/requirements.txt

      - name: Install root dependencies (test runner)
        run: npm ci

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Install AI service dependencies
        run: pip install -r requirements.txt
        working-directory: ai-service

      - name: Run root API tests
        run: npm test

      - name: Run backend API tests
        run: python -m pytest tests/ -v
        working-directory: backend

      - name: Run AI service tests
        run: python -m pytest tests/ -v
        working-directory: ai-service

  # ── Job 2: Validate Vercel-hosted frontend ──────────────────────────────────
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          run_install: false

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts --ignore-workspace
        working-directory: frontend

      - name: Lint frontend
        run: pnpm lint
        working-directory: frontend

      - name: Type-check frontend
        run: pnpm exec tsc --noEmit
        working-directory: frontend

      - name: Build frontend
        run: pnpm build
        working-directory: frontend

  # ── Job 3: Validate Compose and build Docker images ─────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Validate local Compose config
        run: docker compose -f docker-compose.yml config

      - name: Create production env placeholder for Compose validation
        run: touch .env.production

      - name: Validate production API Compose config
        run: docker compose -f docker-compose.api-prod.yml config
        env:
          POSTGRES_DB: proctoring_db
          POSTGRES_USER: proctoring_user
          POSTGRES_PASSWORD: proctoring_pass
          FRONTEND_URL: https://example.com
          AI_SERVICE_TOKEN: ci-internal-token
          EXISTING_NGINX_NETWORK: ci-proxy

      - name: Build backend image
        run: docker build -t proctoring-backend ./backend

      - name: Build frontend image
        run: docker build -t proctoring-frontend ./frontend

      - name: Build AI service image
        run: docker build -t proctoring-ai-service ./ai-service
