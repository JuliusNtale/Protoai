name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy API to VPS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - name: Validate deployment secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY || secrets.SERVER_SSH_KEY }}
        run: |
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$DEPLOY_SSH_KEY"

      - name: Resolve deployment ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -eu

            APP_DIR="/opt/proctorai/ai-exam-proctoring-system"
            COMPOSE="docker compose --env-file .env.production -f docker-compose.api-prod.yml"

            cd "$APP_DIR"

            test -f .env.production
            test -f ai-service/models/facenet_best.onnx
            test -f ai-service/models/facenet_best.onnx.data
            test -f ai-service/models/gaze_model.onnx

            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            test "$(git rev-parse HEAD)" = "${{ steps.ref.outputs.sha }}"

            $COMPOSE config >/tmp/proctorai-compose-rendered.yml
            $COMPOSE up -d postgres
            $COMPOSE build backend ai-service
            $COMPOSE run --rm backend alembic upgrade head
            $COMPOSE up -d backend ai-service

            for container in proctorai-postgres proctorai-backend proctorai-ai-service; do
              i=0
              while [ "$i" -lt 30 ]; do
                status="$(docker inspect "$container" --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}')"
                if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                  break
                fi
                i=$((i + 1))
                sleep 2
              done
              status="$(docker inspect "$container" --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}')"
              if [ "$status" != "healthy" ] && [ "$status" != "running" ]; then
                echo "Container $container failed health check with status: $status"
                docker logs --tail 120 "$container"
                exit 1
              fi
            done

            curl -fsS https://proctoaibackend.neuraltale.com/health >/dev/null
            curl -fsS https://proctoaibackend.neuraltale.com/ai/health >/dev/null

            docker ps --filter "name=proctorai" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
